apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: versioning-ingress
  namespace: cse474-prod
spec:
  rules:
    - host: versioning.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: versioning-service
                port:
                  number: 3000